version: 3

env:
  BIN_NAME: "glrdb"
  DB_NAME: "{{.BIN_NAME}}.boltdb"

tasks:
  build:
    desc: "Build"
    sources:
      - src/**/*.go
    generates:
      - "{{.BIN_NAME}}"
    cmds:
      - go build -o {{.BIN_NAME}} ./src

  update:
    desc: "DBを更新する"
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}} update

  print:
    desc: "DBの内容を表示する"
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}} print | fzf --delimiter '\t' --with-nth 1 --preview 'echo {2} | base64 -d' | cut -f1

  list:
    desc: "DBの内容を表示する"
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}} list
  
  init:
    desc: "tomlファイルの初期値を生成する"
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}} init

  help:
    desc: "ヘルプを表示する"
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}} help


  clean:
    desc: "Clean"
    cmds:
      - rm -rf {{.BIN_NAME}} {{.DB_NAME}}

  tag:
    desc: "タグを更新する"
    cmds:
      - git tag $(./{{.BIN_NAME}} version)

  default:
    cmds:
      - task --list


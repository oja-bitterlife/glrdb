version: 3

env:
  BIN_NAME: glrdb

tasks:
  build:
    desc: Build
    sources:
      - ./**/*.go
    generates:
      - "{{.BIN_NAME}}"
    cmds:
      - go build -o {{.BIN_NAME}}

  run:
    desc: Run
    deps:
      - build
    cmds:
      - ./{{.BIN_NAME}}

  update:
    desc: DBを更新する
    cmds:
      - ./{{.BIN_NAME}} update

  print:
    desc: DBの内容を表示する
    cmds:
      - ./{{.BIN_NAME}} print

  clean:
    desc: Clean
    cmds:
      - rm -rf {{.BIN_NAME}}

  tag:
    desc: タグを更新する
    cmds:
      - git tag $(./{{.BIN_NAME}} version)

  default:
    cmds:
      - task --list

